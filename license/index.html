<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catjang License</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="license-shell">
    <section class="license-panel">
      <img class="brand-mark" src="../workspace/assets/svg/catjang-logo.svg" alt="" aria-hidden="true">
      <div class="language-row" aria-label="Language" data-i18n-aria-label="language">
        <button class="language-option" type="button" data-language="en">EN</button>
        <button class="language-option" type="button" data-language="ko">KO</button>
        <button class="language-option" type="button" data-language="ja">JA</button>
      </div>
      <h1>Catjang</h1>
      <p class="intro" data-i18n="intro">Enter a prototype key to activate Catjang. Default keys are listed in the project README.</p>

      <form id="license-form">
        <label for="license-key" data-i18n="licenseKey">License key</label>
        <input id="license-key" name="license-key" type="text" autocomplete="off" autocapitalize="none" spellcheck="false" required>
        <button id="activate-button" type="submit" data-i18n="activate">Activate</button>
      </form>

      <p id="status-message" class="status-message" role="status" aria-live="polite"></p>
    </section>
  </main>
  <script src="license.js"></script>
</body>
</html>
